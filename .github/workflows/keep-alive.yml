name: Keep Alive
on:
  schedule:
    # 每周一 UTC 00:00 = 北京时间 8:00
    - cron: '0 0 * * 1'
  workflow_dispatch:
jobs:
  keep-alive:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 更新时间戳
        run: echo "Last updated: $(date -u)" > .last-updated
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-updated
          git commit -m "keep alive" || echo "No changes to commit"
          git push
