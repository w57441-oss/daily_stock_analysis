name: 股价预警
on:
  schedule:
    # 北京时间 9:25-11:55 = UTC 1:25-3:55
    - cron: '*/5 1-3 * * 1-5'
    # 北京时间 12:55-15:05 = UTC 4:55-7:05  
    - cron: '*/5 5-7 * * 1-5'
  workflow_dispatch:
jobs:
  alert-check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install -r requirements.txt
      
      - name: 运行预警检查
        env:
          AGENT_EVENT_MONITOR_ENABLED: ${{ vars.AGENT_EVENT_MONITOR_ENABLED }}
          AGENT_EVENT_MONITOR_INTERVAL_MINUTES: ${{ vars.AGENT_EVENT_MONITOR_INTERVAL_MINUTES }}
          AGENT_EVENT_ALERT_RULES_JSON: ${{ vars.AGENT_EVENT_ALERT_RULES_JSON }}
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          STOCK_LIST: ${{ vars.STOCK_LIST }}
        run: python main.py --dry-run --stocks $STOCK_LIST
