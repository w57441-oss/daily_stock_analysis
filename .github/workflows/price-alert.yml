name: 股价预警
on:
  schedule:
    # 北京时间 9:15-11:30 = UTC 1:15-3:30
    - cron: '*/5 1-3 * * 1-5'
    # 北京时间 13:00-15:00 = UTC 5:00-7:00
    - cron: '*/5 5-7 * * 1-5'
  workflow_dispatch:
jobs:
  alert-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: 运行价格预警
        env:
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          AGENT_EVENT_ALERT_RULES_JSON: ${{ secrets.AGENT_EVENT_ALERT_RULES_JSON }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        run: python scripts/price_alert.py
