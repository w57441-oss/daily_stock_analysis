name: 股价预警
on:
  schedule:
    # 扩大覆盖范围：UTC 1:00-4:55 (原1-3→1-4) → 北京时间 9:00-12:55
    # 确保覆盖因延迟可能触发的11:30-11:55时段
    - cron: '*/5 1-3 * * 1-5'
    
    # 下午时段保持不变（UTC 5:00-7:55 → 北京时间13:00-15:55）
    - cron: '*/5 5-7 * * 1-5'
  workflow_dispatch:

jobs:
  alert-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    # 新增：失败时自动重试1次（应对临时网络问题）
    strategy:
      max-parallel: 1
      fail-fast: false

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: 运行价格预警（含时段校验）
        env:
          STOCK_LIST: ${{ secrets.STOCK_LIST }}
          AGENT_EVENT_ALERT_RULES_JSON: ${{ secrets.AGENT_EVENT_ALERT_RULES_JSON }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
        # 关键：添加超时重试 + 显式记录触发时间
        run: |
          echo "【触发时间】$(date +'%Y-%m-%d %H:%M:%S %Z')"
          python scripts/price_alert.py || (sleep 30 && python scripts/price_alert.py)
