name: 股价预警
on:
  schedule:
    - cron: '*/5 1-3 * * 1-5'
    - cron: '*/5 5-7 * * 1-5'
  workflow_dispatch:
jobs:
  alert-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      
      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: 运行价格预警
        env:
          STOCK_LIST: '002658'
          AGENT_EVENT_ALERT_RULES_JSON: '[{"stock_code":"002658","alert_type":"price_cross","direction":"above","price":7.45},{"stock_code":"002658","alert_type":"price_cross","direction":"below","price":7.2}]'
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ vars.EMAIL_RECEIVERS }}
        run: python scripts/price_alert.py
